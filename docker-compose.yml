services:
  carouselify-backend:
    build: ./backend
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/carouselify.db
      SECRET: ${SECRET:-change-me-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      POLAR_ACCESS_TOKEN: ${POLAR_ACCESS_TOKEN:-}
      POLAR_WEBHOOK_SECRET: ${POLAR_WEBHOOK_SECRET:-}
      POLAR_ORGANIZATION_ID: ${POLAR_ORGANIZATION_ID:-}
      POLAR_PRODUCT_ID: ${POLAR_PRODUCT_ID:-}
      POLAR_SERVER: ${POLAR_SERVER:-production}
      SUBSCRIPTIONS_ENABLED: ${SUBSCRIPTIONS_ENABLED:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    ports:
      - "8000:8000"
    volumes:
      - carouselify_data:/app/data
    develop:
      watch:
        - path: ./backend
          action: rebuild

  carouselify-frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      - carouselify-backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      PORT: 4000
    ports:
      - "4000:4000"
    develop:
      watch:
        - path: ./frontend
          action: sync
          target: /app
          ignore:
            - node_modules/
            - .next/

volumes:
  carouselify_data:
