services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: carouselify
      POSTGRES_PASSWORD: carouselify
      POSTGRES_DB: carouselify
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carouselify"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://carouselify:carouselify@postgres:5432/carouselify
      SECRET: change-me-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LEMON_SQUEEZY_API_KEY: ${LEMON_SQUEEZY_API_KEY:-}
      LEMON_SQUEEZY_WEBHOOK_SECRET: ${LEMON_SQUEEZY_WEBHOOK_SECRET:-}
      LEMON_SQUEEZY_STORE_ID: ${LEMON_SQUEEZY_STORE_ID:-}
      LEMON_SQUEEZY_PRODUCT_VARIANT_ID: ${LEMON_SQUEEZY_PRODUCT_VARIANT_ID:-}
    ports:
      - "8000:8000"
    develop:
      watch:
        - path: ./backend
          action: rebuild

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    develop:
      watch:
        - path: ./frontend
          action: sync
          target: /app
          ignore:
            - node_modules/
            - .next/

volumes:
  pgdata:
